name: doc-generator
description: "为代码库自动生成文档"

goal: |
  分析指定目录下的代码文件，生成清晰的 API 文档。
  文档应包含：函数签名、参数说明、返回值、使用示例。

tools:
  - @anthropic/filesystem-mcp

constraints:
  - 只读取代码文件，不修改源代码
  - 生成的文档保存到 docs/ 目录
  - 使用中文撰写文档

inputs:
  path:
    type: string
    description: "要文档化的代码目录路径"
  language:
    type: string
    description: "代码语言 (typescript, python, go 等)"

output:
  format: markdown
  to: file
