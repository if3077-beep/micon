name: pr-reviewer
description: "自动审查 GitHub PR，关注安全和性能问题"

goal: |
  审查指定仓库的 Pull Request，重点关注安全漏洞、性能问题和逻辑错误。
  将审查结果以评论的形式发布到 PR 上。

tools:
  - @anthropic/github-mcp

constraints:
  - 只读代码，不修改任何文件
  - 只评论，不 approve 或 merge PR
  - 发现高危安全漏洞时标注 [HIGH]

inputs:
  repo:
    type: string
    description: "仓库路径，如 myorg/myrepo"
  pr_number:
    type: number
    description: "PR 编号"

output:
  format: markdown
  to: github-pr-comment

model: gpt-4o
maxSteps: 8
